name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NEXT_PUBLIC_BASE_PATH: /krinfo
  NEXT_STATIC_EXPORT: true

jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Temporarily move API routes (not supported in static export)
        run: mv app/api ../api-temp || true

      - name: Temporarily remove intercepting routes (not supported in static export)
        run: |
          for dir in app/artifacts app/heroes app/bosses app/team-builder; do
            mv "$dir/@modal" "../modal-temp-$(basename $dir)" || true
            rm -f "$dir/default.tsx" || true
          done

      - name: Build Next.js app
        run: bun run build

      - name: Restore API routes
        run: mv ../api-temp app/api || true
        if: always()

      - name: Restore intercepting routes
        run: |
          for dir in app/artifacts app/heroes app/bosses app/team-builder; do
            mv "../modal-temp-$(basename $dir)" "$dir/@modal" || true
          done
          git checkout -- app/artifacts/default.tsx app/heroes/default.tsx app/bosses/default.tsx || true
        if: always()

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
